<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悠楽 POS (診斷版)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.5.39/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #error-box { background: #fee; color: #c00; padding: 20px; margin: 20px; border: 2px solid red; border-radius: 12px; }
    #error-box pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <!-- 錯誤顯示區 -->
  <div id="error-box" style="display:none;">
    <h2>⚠️ 應用程式發生錯誤</h2>
    <pre id="error-message"></pre>
  </div>

  <div id="app">
    <!-- 如果 Vue 正常運作，這裡會被取代 -->
    <div style="text-align:center;padding:50px;color:#999;">載入中...</div>
  </div>

  <script>
    // 全局錯誤捕獲
    window.onerror = function(message, source, lineno, colno, error) {
      const box = document.getElementById('error-box');
      const msg = document.getElementById('error-message');
      box.style.display = 'block';
      msg.textContent = message + '\n' + (error?.stack || '');
      console.error('Global error:', message, error);
      return true; // 阻止默認處理
    };

    // 捕獲未處理的 Promise 錯誤
    window.addEventListener('unhandledrejection', function(e) {
      const box = document.getElementById('error-box');
      const msg = document.getElementById('error-message');
      box.style.display = 'block';
      msg.textContent = 'Unhandled Promise rejection: ' + e.reason;
      console.error('Unhandled rejection:', e.reason);
    });
  </script>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    // ===== 極簡化版本，只保留核心功能以測試 =====
    const app = createApp({
      setup() {
        const lang = ref('zh');
        const $t = (key) => key; // 簡化翻譯
        const currentPage = ref('queue');

        // 技師資料（簡化）
        const staffs = ref([
          { id: 1, name: 'A師傅', status: 'waiting', queueOrder: 1, queueTimestamp: Date.now() },
          { id: 2, name: 'B師傅', status: 'waiting', queueOrder: 2, queueTimestamp: Date.now() + 1000 },
        ]);

        const waitingStaffs = computed(() => {
          return staffs.value.filter(s => s.status === 'waiting')
                             .sort((a,b) => a.queueOrder - b.queueOrder);
        });

        const formatTimer = (sec) => {
          const s = Math.floor(sec || 0);
          const m = Math.floor(s / 60);
          const r = s % 60;
          return `${m}:${r.toString().padStart(2, '0')}`;
        };

        const getStatusText = (s) => {
          if (s.status === 'waiting') return '🟢 待班';
          return '⚪ 休息';
        };

        // 簡單返回
        return {
          lang,
          $t,
          currentPage,
          staffs,
          waitingStaffs,
          formatTimer,
          getStatusText,
        };
      }
    });

    // 掛載
    try {
      app.mount('#app');
      console.log('✅ Vue 應用已成功掛載');
      document.getElementById('error-box').style.display = 'none';
    } catch (err) {
      const box = document.getElementById('error-box');
      const msg = document.getElementById('error-message');
      box.style.display = 'block';
      msg.textContent = '掛載失敗: ' + err.message + '\n' + err.stack;
      console.error('Mount error:', err);
    }
  </script>
</body>
</html>
