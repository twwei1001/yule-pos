<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇯🇵 無人沙龍 POS 與輪牌自動化系統</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Tailwind CSS 讓排版乾淨漂亮 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fcfbf9] text-[#333] font-sans antialiased">

    <div id="app" class="max-w-3xl mx-auto p-6 min-h-screen">
      
      <!-- 頂部標題 -->
      <header class="text-center mb-8">
        <h2 class="text-2xl font-medium text-[#2c3e50] mb-1">サロン自動輪牌與狀態管理看板</h2>
        <p class="text-sm text-[#7f8c8d]">無人櫃檯自助營運系統</p>
      </header>

      <!-- 🎯 輪牌視覺排行榜 -->
      <div class="bg-white border border-[#e2dedb] p-5 rounded-xl mb-8 shadow-sm">
        <h3 class="text-base font-semibold text-[#34495e] mb-4 flex items-center gap-2">
          <span>📌</span> 待班輪牌序列 (Waiting Queue)
        </h3>
        
        <div v-if="waitingList.length === 0" class="text-[#95a5a6] text-sm">
          目前沒有人在待班序列中
        </div>
        
        <div v-else class="flex gap-3 overflow-x-auto pb-2">
          <div v-for="(s, index) in waitingList" :key="s.id" 
               :class="index === 0 ? 'bg-[#f39c12] text-white shadow-md' : 'bg-[#f8f9fa] text-[#2c3e50] border border-[#e9ecef]'"
               class="p-3 rounded-lg min-w-[120px] text-center transition-all">
            <div class="text-xs opacity-90 mb-1">順位 #{{ index + 1 }}</div>
            <div class="text-base font-bold">{{ s.name }}</div>
            <div v-if="index === 0" class="text-[10px] mt-1 bg-black/15 rounded px-1 py-0.5">Next 接客</div>
          </div>
        </div>
      </div>

      <!-- 👥 技師即時狀態控制台 -->
      <h3 class="text-base font-semibold text-[#34495e] mb-4">技師個人操作面板</h3>
      <div class="flex flex-col gap-4">
        <div v-for="s in staffs" :key="s.id" class="bg-white border border-[#e2dedb] p-5 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm">
          
          <!-- 左側：名字與狀態 -->
          <div>
            <div class="text-lg font-semibold text-[#2c3e50] mb-1">{{ s.name }}</div>
            <div class="text-sm flex items-center gap-2">
              <span>狀態：</span>
              <span class="px-3 py-1 rounded-full text-xs font-medium"
                    :class="{
                      'bg-[#e8f8f5] text-[#16a085]': s.status === 'waiting',
                      'bg-[#fef9e7] text-[#f39c12]': s.status === 'prep',
                      'bg-[#fdebd0] text-[#e67e22]': s.status === 'timer',
                      'bg-[#f2f4f4] text-[#7f8c8d]': s.status === 'rest'
                    }">
                <template v-if="s.status === 'waiting'">🟢 待班中</template>
                <template v-else-if="s.status === 'prep'">🟡 預備工作中</template>
                <template v-else-if="s.status === 'timer'">🔴 療程進行中 ({{ formatTime(s.timer) }})</template>
                <template v-else-if="s.status === 'rest'">⚪ 休息/下班</template>
              </span>
            </div>
          </div>

          <!-- 右側：操作按鈕 -->
          <div class="flex gap-2 flex-wrap">
            <button v-if="s.status === 'waiting'" @click="startPrep(s.id)" class="bg-[#f39c12] hover:bg-[#d68910] text-white px-4 py-2 rounded-lg text-sm font-medium transition">
              1. 櫃檯結帳 / 準備中
            </button>

            <button v-if="s.status === 'prep'" @click="startTimer(s.id)" class="bg-[#3498db] hover:bg-[#2980b9] text-white px-4 py-2 rounded-lg text-sm font-medium transition">
              2. [房內 NFC] 開始計時
            </button>

            <button v-if="s.status === 'timer'" @click="finishTask(s.id)" class="bg-[#27ae60] hover:bg-[#219653] text-white px-4 py-2 rounded-lg text-sm font-medium transition">
              3. [房內 NFC] 完工回待班
            </button>

            <button v-if="s.status !== 'rest' && s.status !== 'timer' && s.status !== 'prep'" @click="setRest(s.id)" class="bg-[#bdc3c7] hover:bg-[#95a5a6] text-[#2c3e50] px-3 py-2 rounded-lg text-xs transition">
              休息
            </button>

            <button v-if="s.status === 'rest'" @click="setWaiting(s.id)" class="bg-[#27ae60] hover:bg-[#219653] text-white px-4 py-2 rounded-lg text-sm font-medium transition">
              開始上班 (加入排班)
            </button>
          </div>

        </div>
      </div>

    </div>

    <!-- Vue 邏輯控制 -->
    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const staffs = ref([
                    { id: 1, name: 'A 師傅 (Aki)', status: 'waiting', queueTime: 1, timer: 0 },
                    { id: 2, name: 'B 師傅 (Hana)', status: 'waiting', queueTime: 2, timer: 0 },
                    { id: 3, name: 'C 師傅 (Yuki)', status: 'rest', queueTime: null, timer: 0 }
                ]);

                // 倒數計時器
                let timerInterval = null;
                onMounted(() => {
                    timerInterval = setInterval(() => {
                        staffs.value.forEach(s => {
                            if (s.status === 'timer' && s.timer > 0) {
                                s.timer -= 1;
                            }
                        });
                    }, 1000);
                });

                onUnmounted(() => {
                    clearInterval(timerInterval);
                });

                // 按鈕動作
                const startPrep = (id) => {
                    const staff = staffs.value.find(s => s.id === id);
                    if (staff) {
                        staff.status = 'prep';
                        staff.queueTime = null;
                    }
                };

                const startTimer = (id) => {
                    const staff = staffs.value.find(s => s.id === id);
                    if (staff) {
                        staff.status = 'timer';
                        staff.timer = 60; // 測試用 60 秒（正式可改為 3600 秒代表 60 分鐘）
                    }
                };

                const finishTask = (id) => {
                    const staff = staffs.value.find(s => s.id === id);
                    if (staff) {
                        staff.status = 'waiting';
                        staff.queueTime = Date.now(); // 排到隊伍最尾端
                        staff.timer = 0;
                    }
                };

                const setRest = (id) => {
                    const staff = staffs.value.find(s => s.id === id);
                    if (staff) {
                        staff.status = 'rest';
                        staff.queueTime = null;
                        staff.timer = 0;
                    }
                };

                const setWaiting = (id) => {
                    const staff = staffs.value.find(s => s.id === id);
                    if (staff) {
                        staff.status = 'waiting';
                        staff.queueTime = Date.now();
                        staff.timer = 0;
                    }
                };

                // 格式化秒數
                const formatTime = (seconds) => {
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                };

                // 排序待命序列
                const waitingList = computed(() => {
                    return staffs.value
                        .filter(s => s.status === 'waiting')
                        .sort((a, b) => a.queueTime - b.queueTime);
                });

                return {
                    staffs,
                    waitingList,
                    startPrep,
                    startTimer,
                    finishTask,
                    setRest,
                    setWaiting,
                    formatTime
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
