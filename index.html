<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悠楽 POS (診斷版)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.5.39/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #error-box { background: #fee; color: #c00; padding: 15px; margin: 15px; border: 2px solid red; border-radius: 8px; display: none; }
    #error-box pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; }
    .reset-btn { background: #dc2626; color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; }
    .reset-btn:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <!-- 錯誤顯示區 -->
  <div id="error-box">
    <h3>⚠️ 應用程式錯誤</h3>
    <pre id="error-message"></pre>
    <button class="reset-btn" onclick="localStorage.clear(); location.reload();">清除資料並重新整理</button>
  </div>

  <div id="app" style="padding:20px;max-width:600px;margin:0 auto;">
    <div style="text-align:center;padding:50px;color:#999;">載入中...</div>
  </div>

  <script>
    // 全局錯誤捕獲
    window.onerror = function(message, source, lineno, colno, error) {
      const box = document.getElementById('error-box');
      const msg = document.getElementById('error-message');
      box.style.display = 'block';
      msg.textContent = message + '\n' + (error?.stack || '');
      console.error('Global error:', message, error);
      // 隱藏載入中訊息
      document.querySelector('#app').innerHTML = '<div style="color:red;padding:20px;">發生錯誤，請查看上方紅色區塊。</div>';
      return true;
    };

    window.addEventListener('unhandledrejection', function(e) {
      const box = document.getElementById('error-box');
      const msg = document.getElementById('error-message');
      box.style.display = 'block';
      msg.textContent = 'Unhandled Promise rejection: ' + e.reason;
      console.error('Unhandled rejection:', e.reason);
    });

    // ===== 精簡版 Vue 應用（僅測試核心功能） =====
    const { createApp, ref, computed, onMounted } = Vue;

    const app = createApp({
      setup() {
        // 簡單技師資料
        const staffs = ref([
          { id: 1, name: 'A師傅', staffNumber: '001', isLelai: false, status: 'waiting', queueOrder: 1, queueTimestamp: Date.now() },
          { id: 2, name: 'B師傅', staffNumber: '002', isLelai: false, status: 'waiting', queueOrder: 2, queueTimestamp: Date.now() + 1000 },
          { id: 3, name: 'L1師傅', staffNumber: '003', isLelai: true, status: 'waiting', queueOrder: 3, queueTimestamp: Date.now() + 2000 },
        ]);

        const waitingStaffs = computed(() => {
          return staffs.value.filter(s => s.status === 'waiting').sort((a,b) => a.queueOrder - b.queueOrder);
        });

        const getStatusText = (s) => {
          if (s.status === 'waiting') return '🟢 待班';
          return '⚪ 休息';
        };

        const formatTimer = (sec) => {
          const s = Math.floor(sec || 0);
          const m = Math.floor(s / 60);
          const r = s % 60;
          return `${m}:${r.toString().padStart(2, '0')}`;
        };

        // 測試：點擊上班讓技師重新排隊
        const setWaiting = (id) => {
          const s = staffs.value.find(x => x.id === id);
          if (s) {
            s.status = 'waiting';
            s.queueTimestamp = Date.now();
            // 重新排序
            const waiting = staffs.value.filter(st => st.status === 'waiting').sort((a,b) => a.queueTimestamp - b.queueTimestamp);
            waiting.forEach((st, idx) => st.queueOrder = idx + 1);
          }
        };

        const setRest = (id) => {
          const s = staffs.value.find(x => x.id === id);
          if (s) s.status = 'rest';
        };

        return {
          staffs,
          waitingStaffs,
          getStatusText,
          formatTimer,
          setWaiting,
          setRest,
        };
      },
      template: `
        <div>
          <h1 class="text-2xl font-bold mb-4">🏆 輪牌順序 (診斷版)</h1>
          <div class="bg-gray-800 text-white p-4 rounded-xl mb-4">
            <div class="flex flex-wrap gap-2">
              <div v-for="(s, idx) in waitingStaffs" :key="s.id" class="bg-white/10 px-3 py-1 rounded-full text-sm">
                {{ idx+1 }}. {{ s.staffNumber }}{{ s.isLelai ? '樂' : '' }}
              </div>
              <div v-if="waitingStaffs.length===0" class="text-white/50 text-sm">無待班技師</div>
            </div>
          </div>
          <div class="grid grid-cols-1 gap-3">
            <div v-for="s in staffs" :key="s.id" class="bg-white p-3 rounded-xl shadow border flex justify-between items-center">
              <div>
                <span class="text-lg font-bold">{{ s.staffNumber }}{{ s.isLelai ? '樂' : '' }}</span>
                <span class="ml-2 text-sm">{{ s.name }}</span>
                <span class="ml-2 text-xs text-gray-500">{{ getStatusText(s) }}</span>
              </div>
              <div class="flex gap-2">
                <button v-if="s.status==='waiting'" @click="setRest(s.id)" class="bg-gray-200 px-3 py-1 rounded text-xs">休息</button>
                <button v-if="s.status!=='waiting'" @click="setWaiting(s.id)" class="bg-gray-700 text-white px-3 py-1 rounded text-xs">上班</button>
              </div>
            </div>
          </div>
          <p class="text-sm text-gray-400 mt-4">✅ Vue 運作正常！如果看到這個畫面，表示基礎架構沒問題。</p>
        </div>
      `
    });

    try {
      app.mount('#app');
      console.log('✅ 診斷版掛載成功');
      document.getElementById('error-box').style.display = 'none';
    } catch (err) {
      const box = document.getElementById('error-box');
      const msg = document.getElementById('error-message');
      box.style.display = 'block';
      msg.textContent = '掛載失敗: ' + err.message + '\n' + err.stack;
      console.error('Mount error:', err);
    }
  </script>
</body>
</html>
