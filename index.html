<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠楽 SPA - 智慧輪牌與 POS 系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-16">

    <!-- 頂部導覽列 -->
    <header class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold tracking-wide">悠楽 SPA </h1>
                <p class="text-xs text-slate-400">銀座店 | 智慧輪牌與拆單 POS</p>
            </div>
            
            <div class="flex items-center gap-2">
                <!-- 出勤控制台按鈕 -->
                <button onclick="openAttendanceModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-lg text-xs font-semibold border border-slate-700 flex items-center gap-1">
                    <i class="fa-solid fa-clock"></i> <span>出勤班別</span>
                </button>
                <!-- Salon Board 一鍵跳轉 -->
                <a href="https://salonboard.com/login/" target="_blank" rel="noopener noreferrer" 
                   class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-2 rounded-lg text-xs font-semibold shadow flex items-center gap-1 transition">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    <span>Salon Board</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <!-- 智慧派單與開單區塊 -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 space-y-4">
            <h2 class="text-base font-bold text-slate-700 border-b pb-2 flex items-center gap-2">
                <i class="fa-solid fa-file-invoice-dollar text-amber-500"></i> 新增服務開單與智慧排單
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">1. 選擇核心療程與項目</label>
                    <div class="space-y-2 bg-slate-50 p-3 rounded-xl border">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="has-machine" class="w-4 h-4 text-indigo-600 rounded" onchange="updateServiceFlowPreview()">
                            <label for="has-machine" class="text-sm font-medium">是否有機器 (ハイパー / キャビ)</label>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="has-kogao" class="w-4 h-4 text-indigo-600 rounded" onchange="updateServiceFlowPreview()">
                            <label for="has-kogao" class="text-sm font-medium">小顏＋頭部按摩 (不可分割單位)</label>
                        </div>
                        <div class="grid grid-cols-2 gap-2 pt-2 border-t">
                            <div>
                                <label class="block text-xs text-slate-500">基礎手法</label>
                                <select id="base-massage" class="w-full p-2 border rounded-lg text-xs bg-white">
                                    <option value="oil">油推</option>
                                    <option value="shiatsu">指壓</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500">足底按摩</label>
                                <select id="foot-duration" class="w-full p-2 border rounded-lg text-xs bg-white">
                                    <option value="0">無足底</option>
                                    <option value="30">足底 30 分鐘</option>
                                    <option value="60">足底 60 分鐘</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">2. 系統自動判定流程預覽</label>
                        <div id="flow-preview" class="p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-xs font-medium text-indigo-900">
                            載入中...
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">指名設定</label>
                            <select id="dispatch-type" class="w-full p-2 border rounded-xl text-xs bg-slate-50" onchange="toggleSpecifiedTherapist()">
                                <option value="auto">輪牌順位派單 (不指定)</option>
                                <option value="specified">指定技師</option>
                            </select>
                        </div>
                        <div id="specified-container" class="hidden">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">指定人選</label>
                            <select id="specified-therapist-id" class="w-full p-2 border rounded-xl text-xs bg-slate-50">
                                <!-- 動態填入 -->
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 加價與周邊勾選 -->
            <div class="pt-2 border-t text-xs flex flex-wrap gap-4 items-center text-slate-600">
                <span class="font-bold text-slate-700">加價與週邊：</span>
                <label class="flex items-center gap-1"><input type="checkbox" id="add-foot-cream" class="rounded"> 升級腳膏 (+500円)</label>
                <label class="flex items-center gap-1"><input type="checkbox" id="add-eyemask" class="rounded"> 眼罩 (+300円)</label>
            </div>

            <button onclick="executeSmartDispatch()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow transition flex justify-center items-center gap-2 text-sm">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 確認開單並執行智慧輪牌/拆單
            </button>
        </section>

        <!-- 待接力項目池 (Relay Queue Pool) -->
        <section id="relay-pool-section" class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-4 space-y-2">
            <h3 class="text-sm font-bold text-amber-800 flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i> 待接力拆單項目池 (等待後續技師接手)
            </h3>
            <div id="relay-pool-list" class="space-y-2">
                <!-- 動態載入待接力項目 -->
            </div>
        </section>

        <!-- 技師輪牌狀態與技能管理區 -->
        <section class="space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-base font-bold text-slate-700 flex items-center gap-2">
                    <i class="fa-solid fa-users text-indigo-500"></i> 技師即時輪牌與狀態牆
                </h2>
                <button onclick="resetAllData()" class="text-xs text-slate-400 hover:text-red-500 underline">重置系統資料</button>
            </div>
            
            <div id="therapist-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <!-- 動態渲染技師卡片 -->
            </div>
        </section>

    </main>

    <!-- 技能設定 Modal -->
    <div id="skill-modal" class="fixed inset-0 bg-black/50 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-2xl p-5 max-w-md w-full space-y-4 shadow-xl">
            <h3 class="text-base font-bold text-slate-800 flex justify-between items-center">
                <span>技師技能設定：<span id="modal-therapist-name"></span></span>
                <button onclick="closeSkillModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </h3>
            <div id="skill-checkboxes" class="grid grid-cols-2 gap-2 text-sm">
                <!-- 技能選項 -->
                <label class="flex items-center gap-2 p-2 border rounded-lg"><input type="checkbox" value="shiatsu" class="skill-chk"> 指壓</label>
                <label class="flex items-center gap-2 p-2 border rounded-lg"><input type="checkbox" value="oil" class="skill-chk"> 油推</label>
                <label class="flex items-center gap-2 p-2 border rounded-lg"><input type="checkbox" value="hyper" class="skill-chk"> ハイパー (機器)</label>
                <label class="flex items-center gap-2 p-2 border rounded-lg"><input type="checkbox" value="cavi" class="skill-chk"> キャビ (機器)</label>
                <label class="flex items-center gap-2 p-2 border rounded-lg"><input type="checkbox" value="kogao" class="skill-chk"> 小顏＋頭部</label>
                <label class="flex items-center gap-2 p-2 border rounded-lg"><input type="checkbox" value="foot" class="skill-chk"> 足底按摩</label>
            </div>
            <button onclick="saveTherapistSkills()" class="w-full bg-slate-900 text-white py-2.5 rounded-xl font-bold text-sm">儲存技能設定</button>
        </div>
    </div>

    <!-- 出勤班別控制 Modal -->
    <div id="attendance-modal" class="fixed inset-0 bg-black/50 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-2xl p-5 max-w-md w-full space-y-4 shadow-xl">
            <h3 class="text-base font-bold text-slate-800 flex justify-between items-center">
                <span>今日出勤與班別控制</span>
                <button onclick="closeAttendanceModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </h3>
            <p class="text-xs text-slate-500">可設定技師今日班別或調整實際可接單時間（支援臨時晚到/留學生彈性）</p>
            <div id="attendance-list" class="space-y-3 max-h-60 overflow-y-auto">
                <!-- 動態填入 -->
            </div>
            <button onclick="closeAttendanceModal()" class="w-full bg-slate-900 text-white py-2.5 rounded-xl font-bold text-sm">關閉</button>
        </div>
    </div>

    <script>
        // 初始化資料模型
        let therapists = JSON.parse(localStorage.getItem('yule_therapists_v2')) || [
            { id: 1, name: "101號技師", shift: "09:30", status: "idle", queueOrder: 1, todayCount: 0, endTime: null, skills: ["shiatsu", "oil", "hyper", "cavi", "kogao", "foot"], currentTask: null },
            { id: 2, name: "102號技師", shift: "10:00", status: "idle", queueOrder: 2, todayCount: 0, endTime: null, skills: ["shiatsu", "oil", "foot"], currentTask: null },
            { id: 3, name: "105號技師", shift: "11:00", status: "idle", queueOrder: 3, todayCount: 0, endTime: null, skills: ["shiatsu", "oil", "kogao", "foot"], currentTask: null }
        ];

        let relayPool = JSON.parse(localStorage.getItem('yule_relay_pool')) || [];
        let editingTherapistId = null;

        function saveAll() {
            localStorage.setItem('yule_therapists_v2', JSON.stringify(therapists));
            localStorage.setItem('yule_relay_pool', JSON.stringify(relayPool));
            renderAll();
        }

        // 即時預覽服務流程順序
        function updateServiceFlowPreview() {
            const hasMachine = document.getElementById('has-machine').checked;
            const hasKogao = document.getElementById('has-kogao').checked;
            const massage = document.getElementById('base-massage').value === 'oil' ? '油推' : '指壓';
            const footVal = document.getElementById('foot-duration').value;

            let flow = [];
            if (hasMachine) flow.push("機器 (ハイパー/キャビ)");
            flow.push(massage);
            if (hasKogao) flow.push("小顏＋頭部 (不可分割)");
            if (footVal !== "0") flow.push(`足底按摩 (${footVal}分)`);

            document.getElementById('flow-preview').innerText = "流程順序： " + flow.join(" ➔ ");
        }

        function toggleSpecifiedTherapist() {
            const type = document.getElementById('dispatch-type').value;
            const container = document.getElementById('specified-container');
            container.classList.toggle('hidden', type !== 'specified');
            if (type === 'specified') {
                const select = document.getElementById('specified-therapist-id');
                select.innerHTML = '';
                therapists.forEach(t => {
                    select.innerHTML += `<option value="${t.id}">${t.name} (班別:${t.shift})</option>`;
                });
            }
        }

        // 智慧派單與拆單核心邏輯
        function executeSmartDispatch() {
            const hasMachine = document.getElementById('has-machine').checked;
            const hasKogao = document.getElementById('has-kogao').checked;
            const massageType = document.getElementById('base-massage').value;
            const footDuration = parseInt(document.getElementById('foot-duration').value);
            const dispatchType = document.getElementById('dispatch-type').value;

            // 組裝任務清單
            let tasks = [];
            if (hasMachine) tasks.push({ type: 'machine', name: '機器護理', duration: 30 });
            tasks.push({ type: massageType, name: massageType === 'oil' ? '油推' : '指壓', duration: 60 });
            if (hasKogao) tasks.push({ type: 'kogao', name: '小顏＋頭部', duration: 50 });
            if (footDuration > 0) tasks.push({ type: 'foot', name: '足底按摩', duration: footDuration });

            if (dispatchType === 'specified') {
                const specId = parseInt(document.getElementById('specified-therapist-id').value);
                const target = therapists.find(t => t.id === specId);
                assignTasksToTherapist(target, tasks, true);
            } else {
                // 自動輪牌：尋找佇列中空閒且具備開頭技能的第一位技師
                const idleQueue = therapists.filter(t => t.status === 'idle').sort((a,b) => a.queueOrder - b.queueOrder);
                if (idleQueue.length === 0) return alert("目前沒有空閒的技師可派單！");

                const firstTaskType = tasks[0].type;
                const capableTherapist = idleQueue.find(t => t.skills.includes(firstTaskType));

                if (!capableTherapist) {
                    return alert("目前排班中沒有技師會做此項目的開頭技能！");
                }

                assignTasksToTherapist(capableTherapist, tasks, false);
            }
            saveAll();
        }

        function assignTasksToTherapist(therapist, tasks, isSpecified) {
            // 計算總時間
            const totalDuration = tasks.reduce((sum, t) => sum + t.duration, 0);
            
            therapist.status = 'busy';
            therapist.endTime = Date.now() + totalDuration * 60 * 1000;
            therapist.todayCount += 1;
            therapist.currentTask = { tasks, isSpecified };

            if (!isSpecified) {
                adjustQueueAfterBusy(therapist);
            }
            alert(`成功派單給 ${therapist.name}！ 總時長 ${totalDuration} 分鐘`);
        }

        function adjustQueueAfterBusy(busyTherapist) {
            const remainingIdle = therapists.filter(t => t.status === 'idle' && t.id !== busyTherapist.id)
                                            .sort((a,b) => a.queueOrder - b.queueOrder);
            remainingIdle.forEach((t, idx) => t.queueOrder = idx + 1);
            busyTherapist.queueOrder = 999;
        }

        function completeService(id) {
            const therapist = therapists.find(t => t.id === id);
            if (!therapist) return;

            therapist.status = 'idle';
            therapist.endTime = null;
            therapist.currentTask = null;

            const maxQueue = Math.max(...therapists.filter(t => t.status === 'idle').map(t => t.queueOrder), 0);
            therapist.queueOrder = maxQueue + 1;

            saveAll();
        }

        // 技能 Modal 控制
        function openSkillModal(id) {
            editingTherapistId = id;
            const t = therapists.find(x => x.id === id);
            document.getElementById('modal-therapist-name').innerText = t.name;
            document.querySelectorAll('.skill-chk').forEach(chk => {
                chk.checked = t.skills.includes(chk.value);
            });
            document.getElementById('skill-modal').classList.remove('hidden');
        }
        function closeSkillModal() { document.getElementById('skill-modal').classList.add('hidden'); }
        function saveTherapistSkills() {
            const t = therapists.find(x => x.id === editingTherapistId);
            t.skills = [];
            document.querySelectorAll('.skill-chk').forEach(chk => {
                if (chk.checked) t.skills.push(chk.value);
            });
            closeSkillModal();
            saveAll();
        }

        // 出勤 Modal 控制
        function openAttendanceModal() {
            const list = document.getElementById('attendance-list');
            list.innerHTML = '';
            therapists.forEach(t => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-2 border rounded-xl bg-slate-50 text-xs">
                        <span class="font-bold">${t.name}</span>
                        <div class="flex items-center gap-2">
                            <span>排班班別：</span>
                            <select onchange="updateShift(${t.id}, this.value)" class="p-1 border rounded bg-white">
                                <option value="09:30" ${t.shift==='09:30'?'selected':''}>09:30 (開門)</option>
                                <option value="10:00" ${t.shift==='10:00'?'selected':''}>10:00 (早班)</option>
                                <option value="11:00" ${t.shift==='11:00'?'selected':''}>11:00 (晚班)</option>
                            </select>
                        </div>
                    </div>
                `;
            });
            document.getElementById('attendance-modal').classList.remove('hidden');
        }
        function closeAttendanceModal() { document.getElementById('attendance-modal').classList.add('hidden'); }
        function updateShift(id, shift) {
            const t = therapists.find(x => x.id === id);
            if (t) t.shift = shift;
            saveAll();
        }

        function resetAllData() {
            if (confirm("確定要重置所有技師狀態與資料嗎？")) {
                localStorage.removeItem('yule_therapists_v2');
                localStorage.removeItem('yule_relay_pool');
                location.reload();
            }
        }

        // 即時渲染畫面
        function renderAll() {
            const grid = document.getElementById('therapist-grid');
            grid.innerHTML = '';

            const sorted = [...therapists].sort((a,b) => {
                if (a.status === 'idle' && b.status === 'idle') return a.queueOrder - b.queueOrder;
                if (a.status === 'idle') return -1;
                if (b.status === 'idle') return 1;
                return a.endTime - b.endTime;
            });

            sorted.forEach(t => {
                const isIdle = t.status === 'idle';
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl border ${isIdle ? 'bg-white border-slate-200' : 'bg-amber-50 border-amber-200'} shadow-sm flex flex-col justify-between space-y-3`;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-base text-slate-800">${t.name}</span>
                                ${isIdle 
                                    ? `<span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full font-bold">輪牌第 ${t.queueOrder} 順位</span>`
                                    : `<span class="bg-amber-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">服務中</span>`
                                }
                            </div>
                            <div class="text-xs text-slate-400 mt-0.5">班別：${t.shift} | 今日已接：${t.todayCount} 節</div>
                        </div>
                        <button onclick="openSkillModal(${t.id})" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1.5 rounded-lg font-semibold">
                            <i class="fa-solid fa-gear"></i> 技能
                        </button>
                    </div>

                    ${!isIdle ? `<div class="text-sm font-bold text-amber-600" id="timer-${t.id}">計算中...</div>` : `<div class="text-xs text-slate-400">等待派單中...</div>`}

                    <div class="flex justify-between items-center pt-2 border-t text-xs">
                        <span class="text-slate-500 truncate max-w-[180px]">技能：${t.skills.length > 0 ? t.skills.join(', ') : '尚未設定'}</span>
                        ${!isIdle ? `<button onclick="completeService(${t.id})" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg font-bold">手動結束</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            updateServiceFlowPreview();
            toggleSpecifiedTherapist();
        }

        // 計時器更新
        setInterval(() => {
            const now = Date.now();
            therapists.forEach(t => {
                if (t.status === 'busy' && t.endTime) {
                    const remainingSec = Math.max(0, Math.floor((t.endTime - now) / 1000));
                    const mins = Math.floor(remainingSec / 60);
                    const secs = remainingSec % 60;
                    const el = document.getElementById(`timer-${t.id}`);
                    if (el) el.innerText = `剩餘時間：${mins}分 ${secs < 10 ? '0' : ''}${secs}秒`;
                    if (remainingSec === 0) completeService(t.id);
                }
            });
        }, 1000);

        renderAll();
    </script>
</body>
</html>
