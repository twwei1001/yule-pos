<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠楽 & 樂來 智能POS系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 max-w-md mx-auto">

    <div class="bg-white rounded-xl shadow-md p-5 mb-4 border border-gray-100">
        <h1 class="text-xl font-bold text-slate-800 mb-1">🇯🇵 悠楽 & 樂來 POS</h1>
        <p class="text-xs text-gray-500 mb-4">即時金額試算與計時系統</p>
        
        <div class="flex justify-between items-center bg-slate-100 p-3 rounded-lg mb-4">
            <div>
                <div class="text-xs text-gray-500">今日總客數</div>
                <div class="text-lg font-bold text-slate-700" id="totalCustomers">0 人</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-500">今日總營收</div>
                <div class="text-lg font-bold text-orange-600" id="totalRevenue">¥0</div>
            </div>
        </div>

        <!-- 技師狀態 -->
        <div class="space-y-3">
            <div class="p-3 border rounded-lg flex justify-between items-center bg-white shadow-sm">
                <div>
                    <h3 class="font-bold text-sm text-slate-700">A 師傅 (Aki)</h3>
                    <span id="status-1" class="text-xs px-2 py-0.5 rounded bg-emerald-100 text-emerald-700 font-medium">🟢 待班中</span>
                </div>
                <button onclick="openCheckout('A 師傅 (Aki)')" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium shadow">
                    櫃檯結帳
                </button>
            </div>

            <div class="p-3 border rounded-lg flex justify-between items-center bg-white shadow-sm">
                <div>
                    <h3 class="font-bold text-sm text-slate-700">B 師傅 (Hana)</h3>
                    <span id="status-2" class="text-xs px-2 py-0.5 rounded bg-emerald-100 text-emerald-700 font-medium">🟢 待班中</span>
                </div>
                <button onclick="openCheckout('B 師傅 (Hana)')" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium shadow">
                    櫃檯結帳
                </button>
            </div>
        </div>
    </div>

    <!-- 簡易結帳區塊 -->
    <div id="checkoutModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-xl">
            <h3 class="text-base font-bold text-slate-800 mb-2" id="modalTitle">結帳設定</h3>
            
            <label class="block text-xs font-bold text-gray-600 mb-1">選擇基礎課程</label>
            <select id="serviceSelect" class="w-full border rounded-lg p-2 text-xs mb-3 bg-gray-50">
                <option value="4980">【HotPepper】手技按摩 60分 - ¥4,980</option>
                <option value="7980">【HotPepper】全身アロマ 90分 - ¥7,980</option>
                <option value="10980">【HotPepper】深層指圧×リンパ 120分 - ¥10,980</option>
            </select>

            <label class="block text-xs font-bold text-gray-600 mb-1">支付方式</label>
            <select id="paymentSelect" class="w-full border rounded-lg p-2 text-xs mb-4 bg-gray-50">
                <option value="0">現金 / PayPay / WeChat / 支付宝 (無手續費)</option>
                <option value="0.05">刷卡 (含 5% 手續費)</option>
            </select>

            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs">取消</button>
                <button onclick="confirmCheckout()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-medium">確認完成</button>
            </div>
        </div>
    </div>

    <script>
        let currentStaff = '';
        let count = 0;
        let revenue = 0;

        function openCheckout(staffName) {
            currentStaff = staffName;
            document.getElementById('modalTitle').innerText = `為 ${staffName} 結帳`;
            document.getElementById('checkoutModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('checkoutModal').classList.add('hidden');
        }

        function confirmCheckout() {
            const price = parseInt(document.getElementById('serviceSelect').value);
            const feeRate = parseFloat(document.getElementById('paymentSelect').value);
            const finalPrice = Math.round(price * (1 + feeRate));

            count += 1;
            revenue += finalPrice;

            document.getElementById('totalCustomers').innerText = `${count} 人`;
            document.getElementById('totalRevenue').innerText = `¥${revenue.toLocaleString()}`;
            
            closeModal();
            alert(`${currentStaff} 結帳完成！金額：¥${finalPrice.toLocaleString()}`);
        }
    </script>
</body>
</html>
