<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA POS - 技師輪牌與狀態管理系統</title>
    <!-- 載入 Tailwind CSS 樣式庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- 頁首與標題 -->
        <div class="flex justify-between items-center bg-white p-5 rounded-xl shadow-md">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">悠樂 SPA - 技師輪牌與即時看板</h1>
                <p class="text-sm text-gray-500">自動輪牌排單 ｜ 服務時間監控 ｜ 出勤管理</p>
            </div>
            <div class="text-right">
                <span id="current-time" class="text-xl font-bold text-indigo-600">--:--:--</span>
            </div>
        </div>

        <!-- 系統操作區：派單與模擬 -->
        <div class="bg-white p-5 rounded-xl shadow-md border-l-4 border-indigo-500 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
                <label class="font-bold text-gray-700">顧客選擇：</label>
                <select id="assign-type" class="p-2 border rounded-lg bg-gray-50">
                    <option value="auto">【不指定】自動依輪牌分配</option>
                    <option value="manual">【指定技師】指定服務</option>
                </select>
                
                <select id="selected-therapist" class="p-2 border rounded-lg bg-gray-50 hidden">
                    <!-- 動態載入可指定的技師 -->
                </select>

                <select id="service-duration" class="p-2 border rounded-lg bg-gray-50">
                    <option value="60">60 分鐘療程</option>
                    <option value="90">90 分鐘療程</option>
                    <option value="120">120 分鐘療程</option>
                </select>
            </div>

            <button onclick="dispatchOrder()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition shadow-md">
                🚀 快速派單
            </button>
        </div>

        <!-- 兩大核心卡片區 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- 左側：輪牌佇列 (Waiting Queue) -->
            <div class="bg-white p-5 rounded-xl shadow-md md:col-span-1">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <span>⏳</span> 輪牌佇列 (等待接單)
                    </h2>
                    <span id="queue-count" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0 人</span>
                </div>
                <div id="queue-list" class="space-y-3">
                    <!-- 動態渲染輪牌列表 -->
                </div>
            </div>

            <!-- 右側：全店技師狀態總覽 (All Therapists Status) -->
            <div class="bg-white p-5 rounded-xl shadow-md md:col-span-2">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <span>💆‍♂️</span> 技師全員狀態 (點擊切換狀態)
                    </h2>
                </div>
                <div id="therapist-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- 動態渲染技師狀態卡片 -->
                </div>
            </div>

        </div>

    </div>

    <!-- JavaScript 核心邏輯 -->
    <script>
        // 初始化技師資料庫與預設資料
        let therapists = [
            { id: 1, name: "101 號 (小美)", status: "idle", queueOrder: 1, todayCount: 2, timer: null, endTime: null },
            { id: 2, name: "102 號 (阿傑)", status: "idle", queueOrder: 2, todayCount: 1, timer: null, endTime: null },
            { id: 3, name: "105 號 (芳芳)", status: "idle", queueOrder: 3, todayCount: 3, timer: null, endTime: null },
            { id: 4, name: "108 號 (Kiko)", status: "busy", queueOrder: null, todayCount: 4, timer: null, endTime: Date.now() + 25 * 60 * 1000 },
            { id: 5, name: "110 號 (木村)", status: "off", queueOrder: null, todayCount: 0, timer: null, endTime: null }
        ];

        // 即時時間更新
        setInterval(() => {
            document.getElementById('current-time').innerText = new Date().toLocaleTimeString();
            renderSystem();
        }, 1000);

        // 控制「指定/不指定」選單切換
        document.getElementById('assign-type').addEventListener('change', (e) => {
            const selectTherapist = document.getElementById('selected-therapist');
            if (e.target.value === 'manual') {
                selectTherapist.classList.remove('hidden');
            } else {
                selectTherapist.classList.add('hidden');
            }
        });

        // 渲染整體畫面
        function renderSystem() {
            renderQueue();
            renderTherapistGrid();
            updateManualOptions();
        }

        // 1. 渲染「輪牌佇列」
        function renderQueue() {
            const queueList = document.getElementById('queue-list');
            const idleList = therapists
                .filter(t => t.status === 'idle')
                .sort((a, b) => a.queueOrder - b.queueOrder);

            document.getElementById('queue-count').innerText = `${idleList.length} 人`;

            if (idleList.length === 0) {
                queueList.innerHTML = `<div class="text-center text-gray-400 py-6">目前無空閒技師</div>`;
                return;
            }

            queueList.innerHTML = idleList.map((t, index) => `
                <div class="flex items-center justify-between p-3 bg-gray-50 border border-gray-200 rounded-lg hover:border-indigo-300">
                    <div class="flex items-center gap-3">
                        <span class="w-6 h-6 flex items-center justify-center bg-indigo-600 text-white font-bold rounded-full text-xs">
                            ${index + 1}
                        </span>
                        <div>
                            <div class="font-bold text-gray-800">${t.name}</div>
                            <div class="text-xs text-gray-500">今日已接：${t.todayCount} 鐘</div>
                        </div>
                    </div>
                    <span class="text-xs font-semibold px-2 py-1 bg-green-100 text-green-700 rounded">等待派單</span>
                </div>
            `).join('');
        }

        // 2. 渲染「技師卡片網格」
        function renderTherapistGrid() {
            const grid = document.getElementById('therapist-grid');
            grid.innerHTML = therapists.map(t => {
                let statusBadge = '';
                let timerText = '';
                let cardBorder = 'border-gray-200';

                if (t.status === 'idle') {
                    statusBadge = `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-bold">🟢 空閒中 (輪牌第 ${t.queueOrder} 位)</span>`;
                } else if (t.status === 'busy') {
                    cardBorder = 'border-amber-400 bg-amber-50/30';
                    const remainingMs = Math.max(0, t.endTime - Date.now());
                    const mins = Math.floor(remainingMs / 60000);
                    const secs = Math.floor((remainingMs % 60000) / 1000);
                    statusBadge = `<span class="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded-full font-bold">🔴 服務中</span>`;
                    timerText = `<div class="text-lg font-bold text-amber-600 mt-2">⏳ 剩餘：${mins}分${secs}秒</div>`;

                    // 自動下鐘檢查
                    if (remainingMs <= 0 && t.endTime) {
                        finishService(t.id);
                    }
                } else {
                    cardBorder = 'border-gray-100 bg-gray-50';
                    statusBadge = `<span class="bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full font-bold">⚪ 未出勤/休息</span>`;
                }

                return `
                    <div class="p-4 border-2 ${cardBorder} rounded-xl bg-white shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-gray-800 text-lg">${t.name}</h3>
                                ${statusBadge}
                            </div>
                            <div class="text-xs text-gray-500 mb-2">本日累積：${t.todayCount} 鐘</div>
                            ${timerText}
                        </div>
                        <div class="mt-4 pt-3 border-t flex gap-2 flex-wrap">
                            ${t.status === 'idle' ? `
                                <button onclick="changeStatus(${t.id}, 'off')" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded">簽退/休息</button>
                            ` : ''}
                            ${t.status === 'off' ? `
                                <button onclick="changeStatus(${t.id}, 'idle')" class="text-xs bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-2 py-1 rounded font-bold">上班打卡</button>
                            ` : ''}
                            ${t.status === 'busy' ? `
                                <button onclick="finishService(${t.id})" class="text-xs bg-red-100 text-red-600 hover:bg-red-200 px-2 py-1 rounded font-bold">提前完工(下鐘)</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 3. 更新「指定技師」下拉選單
        function updateManualOptions() {
            const select = document.getElementById('selected-therapist');
            const idleTherapists = therapists.filter(t => t.status === 'idle');
            select.innerHTML = idleTherapists.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        }

        // 核心演算法：派單處理
        function dispatchOrder() {
            const assignType = document.getElementById('assign-type').value;
            const duration = parseInt(document.getElementById('service-duration').value);
            let targetTherapist = null;

            if (assignType === 'auto') {
                // 不指定：自動選取 queueOrder 最小 (排在最前面) 的空閒技師
                const idleList = therapists.filter(t => t.status === 'idle').sort((a, b) => a.queueOrder - b.queueOrder);
                if (idleList.length === 0) {
                    alert('目前沒有空閒的技師可以派單！');
                    return;
                }
                targetTherapist = idleList[0];
            } else {
                // 指定技師
                const selectedId = parseInt(document.getElementById('selected-therapist').value);
                targetTherapist = therapists.find(t => t.id === selectedId);
                if (!targetTherapist || targetTherapist.status !== 'idle') {
                    alert('請選擇一位空閒中的技師！');
                    return;
                }
            }

            // 更新技師狀態為服務中
            targetTherapist.status = 'busy';
            targetTherapist.queueOrder = null;
            targetTherapist.todayCount += 1;
            targetTherapist.endTime = Date.now() + duration * 60 * 1000; // 計算結束時間

            // 重新排列其他空閒技師的輪牌順序
            reorderQueue();
            renderSystem();
            alert(`✅ 派單成功！已指派 [${targetTherapist.name}] 服務 ${duration} 分鐘。`);
        }

        // 核心演算法：服務結束 (下鐘) 重新入牌
        function finishService(therapistId) {
            const therapist = therapists.find(t => t.id === therapistId);
            if (!therapist) return;

            therapist.status = 'idle';
            therapist.endTime = null;

            // 重新加回輪牌隊列的最後一位
            const maxOrder = Math.max(0, ...therapists.filter(t => t.status === 'idle').map(t => t.queueOrder || 0));
            therapist.queueOrder = maxOrder + 1;

            renderSystem();
        }

        // 改變技師狀態 (打卡/休息)
        function changeStatus(therapistId, newStatus) {
            const therapist = therapists.find(t => t.id === therapistId);
            if (!therapist) return;

            therapist.status = newStatus;
            if (newStatus === 'idle') {
                const maxOrder = Math.max(0, ...therapists.filter(t => t.status === 'idle').map(t => t.queueOrder || 0));
                therapist.queueOrder = maxOrder + 1;
            } else {
                therapist.queueOrder = null;
            }

            reorderQueue();
            renderSystem();
        }

        // 重整輪牌順序數字 (保持 1, 2, 3... 連貫)
        function reorderQueue() {
            const idleList = therapists
                .filter(t => t.status === 'idle')
                .sort((a, b) => a.queueOrder - b.queueOrder);
            
            idleList.forEach((t, index) => {
                t.queueOrder = index + 1;
            });
        }

        // 初始首次渲染
        renderSystem();
    </script>
</body>
</html>
